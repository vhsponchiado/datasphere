version: '3.8'

services:
  app:
    build:
      context: .
      target: runner
    container_name: datasphere-api
      - "${PORT:-3000}:3000"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-api_db}
      - JWT_SECRET=${JWT_SECRET:-secret}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-refresh_secret}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - api-network

  db:
    image: postgres:15-alpine
    container_name: datasphere-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-api_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-api_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api-network

networks:
  api-network:
    driver: bridge

volumes:
  postgres_data:
